<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PromZona B2B — Федеральный реестр промышленности</title>
    
    <!-- Deep premium typography from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS dynamic engine -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Space Grotesk', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              slate: {
                55: '#1e293b',
                750: '#1e293b',
                850: '#0f172a',
              }
            },
            fontSize: {
              '2xs': '0.7rem',
              '3xs': '0.625rem',
              '4xs': '0.5rem',
              'rxs': '0.65rem'
            }
          }
        }
      }
    </script>
    
    <!-- Lucide Icons dynamic script -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- JSZip for dynamic zip generation and download -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
      /* Smooth custom CSS scroll behavior and fine tunes */
      html {
        scroll-behavior: smooth;
        -webkit-font-smoothing: antialiased;
      }
      .scroll-x::-webkit-scrollbar {
        height: 4px;
      }
      .scroll-x::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 2px;
      }
    </style>
  </head>
  <body class="bg-slate-50">
    
    <!-- Core reactive injection viewport -->
    <div id="root"></div>

    <!-- Application module startup -->
    <script type="module" src="/src/app.js"></script>
  </body>
</html>
